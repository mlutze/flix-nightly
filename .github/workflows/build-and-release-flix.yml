name: Build and Release Flix

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  JAR_PATH: out/flix/assembly.dest/out.jar

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout flix/flix repository
        uses: actions/checkout@v4
        with:
          repository: flix/flix
          ref: master

      - name: Get Flix commit SHA
        id: flix-sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Mill
        run: ./mill flix.assembly

      - name: Check for successful build
        run: file ${{ env.JAR_PATH }}

      - name: Get build date
        id: build-date
        run: echo "date=$(date '+%B %d, %Y at %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Update latest release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Flix Build
          body: |
            Latest automated build of Flix
            Flix commit: ${{ steps.flix-sha.outputs.sha }}
            Build date: ${{ steps.build-date.outputs.date }}
          files: ${{ env.JAR_PATH }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
